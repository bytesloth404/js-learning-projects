<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A retro-styled two-player Texas Hold'em poker table.">
    <title>Retro Hold'em</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">




        <div class="header">

            <div class="left-side">
                <span id="text1">TWO PLAYER TABLE</span> <br>
                <span id="text2">RETRO HOLD'EM</span>
            </div>


            <div class="right-side">
                <label id="status">Waiting to Start</label>
            </div>

        </div>



        <div class="buttons-div">
            <button id="startRound">START ROUND</button>
            <button id="dealFlop">DEAL FLOP</button>
            <button id="dealTurn">DEAL TURN</button>
            <button id="dealRiver">DEAL RIVER</button>
            <button id="showWinner">SHOW WINNER</button>
        </div>



        <div class="play-area"> 
            <div class="player-side">
                <div class="name">
                    <label>YOU</label>
                </div>
                <div class="player-cards-container">
                    <div class="card" id="playercard1"><span id="number">1</span><span id="suit">♦</span></div>
                    <div class="card" id="playercard2"><span id="number">1</span><span id="suit">♦</span></div>
                </div>
            </div>


            <div class="table-center">

                <div class="table-center-text">
                    <label class="community-card-text">COMMUNITY CARDS</label>
                    <label class="stage">
                        <span id="flop">FLOP</span> / 
                        <span id="turn">TURN</span> / 
                        <span id="river">RIVER</span>
                    </label>
                </div>


                <div class="community-card-container">
                    <div class="card" id="community-card-1"><span id="number">1</span><span id="suit">♦</span></div>
                    <div class="card" id="community-card-2"><span id="number">1</span><span id="suit">♦</span></div>
                    <div class="card" id="community-card-3"><span id="number">1</span><span id="suit">♦</span></div>
                    <div class="card" id="community-card-4"><span id="number">1</span><span id="suit">♦</span></div>
                    <div class="card" id="community-card-5"><span id="number">1</span><span id="suit">♦</span></div>
                </div>
            </div>



            <div class="computer-side">
                <div class="cpu-name">CPU</div>
            </div>


            <div class="player-cards-container">
                <div class="card" id="computer-card-1"><span id="number">1</span><span id="suit">♦</span></div>
                <div class="card" id="computer-card-1"><span id="number">1</span><span id="suit">♦</span></div>
            </div>
        </div>
    </div>


    <script src="index.js"></script>
</body>
</html>
